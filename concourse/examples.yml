var_sources:
  - name: awstoken
    type: idtoken
    config:
      audience: ["sts.amazonaws.com"]

jobs:
  - name: aws-login
    plan:
      - task: print
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: { repository: amazon/aws-cli }
          run:
            path: bash
            args:
              - -e
              - -c
              - |
                aws sts assume-role-with-web-identity \
                  --role-session-name Concourse \
                  --role-arn arn:aws:iam::123456789012:role/concourse-main-hello-world-oidc \
                  --web-identity-token ((awstoken:token)) > creds.json
                echo "Now do something with the temporary credentials in creds.json"

